version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: honeyent-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: honeyent_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./.backend-template/scripts/schema_complete.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  backend:
    build:
      context: ./.backend-template
      dockerfile: Dockerfile
    container_name: honeyent-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=honeyent_db
      - DATABASE_URL=postgresql://postgres:password@db:5432/honeyent_db
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:8080
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - JWT_EXPIRE=7d
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: honeyent-frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:3000/api
      - PORT=8080
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
